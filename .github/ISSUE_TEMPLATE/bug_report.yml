name: Bug Report
description: Report a defect that impacts SecureMeet behavior.
title: "[Bug]: "
labels:
  - type/bug
  - status/ready
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug and impact.
      placeholder: Briefly explain what is broken.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide a deterministic path to reproduce.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: Describe the expected result.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - backend
        - frontend
        - full-stack
        - security
        - ci
        - docs
        - infra
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0
        - P1
        - P2
        - P3
      default: 2
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or Screenshots
      description: Paste logs or drag screenshots as needed.
      render: shell
    validations:
      required: false
